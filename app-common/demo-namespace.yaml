# Namespace: Tạo namespace demo cho API workload
apiVersion: v1
kind: Namespace
metadata:
  name: demo
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    # Policy Controller chỉ enforce namespace có label này
    # Namespace không có label → webhook bỏ qua → không verify signature
    policy.sigstore.dev/include: "true"