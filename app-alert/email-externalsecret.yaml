# ExternalSecret: "Đơn đặt hàng" secret từ AWS vào cluster
# File này AN TOÀN commit lên Git vì không chứa giá trị thật
# ESO đọc file này → gọi AWS API → tạo Secret thông thường trong k8s
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-email
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # ESO sẽ đồng bộ lại mỗi 5 phút
  # Nếu cần rotate ngay: kubectl annotate externalsecret alertmanager-email force-sync=$(date +%s) --overwrite -n monitoring
  refreshInterval: 5m

  # Trỏ đến ClusterSecretStore đã tạo ở app-eso/
  secretStoreRef:
    name: aws-secrets-store
    kind: ClusterSecretStore      # dùng ClusterSecretStore (không phải SecretStore)

  target:
    name: alertmanager-email      # tên k8s Secret sẽ được tạo ra
                                  # phải trùng với secret đang dùng trong Alertmanager config
    creationPolicy: Owner         # ESO quản lý lifecycle của Secret này
    deletionPolicy: Retain        # NẾU ExternalSecret bị xóa nhầm → Secret vẫn giữ lại
                                  # → Alertmanager không bị downtime đột ngột

  data:
    - secretKey: password         # tên key trong k8s Secret (phải match với auth_password_file path)
      remoteRef:
        key: alertmanager/email   # tên secret trên AWS Secrets Manager
        property: password        # field bên trong JSON {"password": "..."}
