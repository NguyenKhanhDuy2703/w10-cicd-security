# Build and push Docker image to GitHub Container Registry
# Pipeline: Build → Trivy Scan → Push → Cosign Sign → Update rollout
name: Build and Push Image

on:
  push:
    branches:
      - main
    paths:
      - 'src/api/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write   # Cosign keyless cần OIDC token từ GitHub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Lowercase image name — Docker registry không chấp nhận chữ hoa
      # github.repository_owner = "NguyenKhanhDuy2703" → "nguyenkhanhduy2703"
      - name: Set lowercase image name
        id: image
        run: |
          echo "name=$(echo '${{ env.REGISTRY }}/${{ github.repository_owner }}/w10-api' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(BREAKING CHANGE:|!:)"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # STEP 1: Build image nhưng CHƯA push
      # load: true → load vào local Docker daemon để Trivy scan được
      - name: Build Docker image (no push yet)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: false
          load: true
          tags: ${{ steps.image.outputs.name }}:${{ steps.semver.outputs.version }}

      # STEP 2: Trivy scan image TRƯỚC KHI push
      # image xấu sẽ không bao giờ lên registry
      - name: Trivy scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image.outputs.name }}:${{ steps.semver.outputs.version }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1          # fail CI nếu có CVE nghiêm trọng
          ignore-unfixed: true  # bỏ qua CVE chưa có fix

      # STEP 3: Push image lên registry (chỉ sau khi scan pass)
      - name: Push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.semver.outputs.version }}

      # STEP 4: Cài Cosign
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      # STEP 5: Ký image bằng digest (keyless)
      # Ký bằng digest vì tag (latest) có thể bị overwrite
      # digest là immutable hash → admission controller verify được chính xác
      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes \
            ${{ steps.image.outputs.name }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "1"

      # STEP 6: Update rollout.yaml dùng image name lowercase
      - name: Update rollout.yaml with new version
        run: |
          sed -i "s|image: ghcr.io/.*/w10-api:.*|image: ${{ steps.image.outputs.name }}:${{ steps.semver.outputs.version }}|g" app-api/rollout.yaml
          sed -i "s|value: \"v.*\"|value: \"v${{ steps.semver.outputs.version }}\"|g" app-api/rollout.yaml

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-api/rollout.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to v${{ steps.semver.outputs.version }}"
            git push
          fi

      - name: Create git tag
        run: |
          git tag v${{ steps.semver.outputs.version }}
          git push origin v${{ steps.semver.outputs.version }}
