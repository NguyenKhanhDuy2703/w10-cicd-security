# Build and push Docker image to GitHub Container Registry
# Pipeline: Build → Trivy Scan → Cosign Sign → Push → Update rollout
name: Build and Push Image

on:
  push:
    branches:
      - main
    paths:
      - 'src/api/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/w10-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write  

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(BREAKING CHANGE:|!:)"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # STEP 1: Build image nhưng CHƯA push
      # push: false → image chỉ tồn tại trong Docker daemon của runner
      # load: true  → load image vào local Docker để Trivy scan được
      - name: Build Docker image (no push yet)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}

      # STEP 2: Trivy scan image vừa build
      # Scan TRƯỚC KHI push → image xấu không bao giờ lên registry
      # exit-code: 1 → CI fail nếu tìm thấy HIGH/CRITICAL CVE
      - name: Trivy scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1         
          ignore-unfixed: true 

      # STEP 3: Push image lên registry (chỉ sau khi scan pass)
      # Dùng digest output để Cosign ký đúng image hash
      - name: Push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}

      # STEP 4: Cài Cosign tool
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      # STEP 5: Ký image bằng Cosign keyless
      # Keyless = không cần private key file, dùng OIDC token từ GitHub
      # Sigstore Fulcio cấp short-lived cert dựa trên GitHub identity
      # Signature lưu vào Sigstore Rekor (public transparency log)
      # và attach vào image trên ghcr.io
      #
      # Ký bằng DIGEST (không phải tag) vì:
      #   - Tag có thể bị overwrite (latest)
      #   - Digest là immutable hash của image
      #   - Admission controller verify bằng digest
      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "1"   # enable keyless mode

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Update rollout.yaml with new version
        run: |
          sed -i "s|image: ghcr.io/.*/w10-api:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}|g" app-api/rollout.yaml
          sed -i "s|value: \"v.*\"|value: \"v${{ steps.semver.outputs.version }}\"|g" app-api/rollout.yaml

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-api/rollout.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to v${{ steps.semver.outputs.version }}"
            git push
          fi

      - name: Create git tag
        run: |
          git tag v${{ steps.semver.outputs.version }}
          git push origin v${{ steps.semver.outputs.version }}
