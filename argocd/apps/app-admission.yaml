
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admission-policy-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  project: default
  source:
    repoURL: https://sigstore.github.io/helm-charts
    chart: policy-controller
    targetRevision: 0.10.6
    helm:
      values: |
        namespaceSelector:
          matchExpressions:
            - key: policy.sigstore.dev/include
              operator: In
              values: ["true"]
  destination:
    server: https://kubernetes.default.svc
    namespace: cosign-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s      
        factor: 2          
        maxDuration: 120s
---

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admission-policy-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    repoURL: https://github.com/NguyenKhanhDuy2703/w10-cicd-security.git
    path: app-admission
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: cosign-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
