apiVersion: apps/v1
kind: Deployment
metadata:
  name: bad-replicas
spec:
  replicas: 6
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: nginx
        image: nginx:1.25.1
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
